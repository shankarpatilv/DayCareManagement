name: .NET CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore
              run: dotnet restore DayCareManagement.sln

            - name: Build
              run: dotnet build DayCareManagement.sln --configuration Release --no-restore

            - name: Test
              run: dotnet test DayCareManagement.sln --configuration Release --no-build --verbosity normal
